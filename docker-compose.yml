version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pudu_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pudu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pudu_secret}
      POSTGRES_DB: ${POSTGRES_DB:-pudu_db}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-pudu}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pudu_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pudu_backend
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://${POSTGRES_USER:-pudu}:${POSTGRES_PASSWORD:-pudu_secret}@postgres:5432/${POSTGRES_DB:-pudu_db}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_refresh}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run start:dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pudu_frontend
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
